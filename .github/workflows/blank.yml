import java.io.*;
import java.time.LocalDateTime;
import java.util.*;

public class Main {

    static List<Evento> eventos = new ArrayList<>();
    static Scanner sc = new Scanner(System.in);

    public static void main(String[] args) {

        carregarEventos();

        int opcao;

        do {
            System.out.println("\n===== MENU =====");
            System.out.println("1 - Cadastrar Evento");
            System.out.println("2 - Listar Eventos");
            System.out.println("3 - Sair");
            System.out.print("Escolha uma opção: ");

            opcao = sc.nextInt();
            sc.nextLine();

            switch (opcao) {
                case 1:
                    cadastrarEvento();
                    break;
                case 2:
                    listarEventos();
                    break;
                case 3:
                    System.out.println("Encerrando...");
                    break;
                default:
                    System.out.println("Opção inválida!");
            }

        } while (opcao != 3);

        salvarEventos();
    }

    static void cadastrarEvento() {

        System.out.println("\n=== Cadastro de Evento ===");

        // RODEIO
        System.out.print("Nome: ");
        String nome = sc.nextLine();

        //  RUA BUCAREST 239
        System.out.print("Endereço: ");
        String endereco = sc.nextLine();

        // FESTA
     System.out.print("Categoria (FESTA, SHOW, ESPORTIVO, CULTURAL): ");
        Categoria categoria = Categoria.valueOf(sc.nextLine().toUpperCase());

        // 2026-04-25T20:30
        System.out.print("Data e hora (AAAA-MM-DDTHH:MM): ");
        LocalDateTime horario = LocalDateTime.parse(sc.nextLine());

        // MUSICAS AO VIVO E CAVALOS 
        System.out.print("Descrição: ");
        String descricao = sc.nextLine();

        eventos.add(new Evento(nome, endereco, categoria, horario, descricao));

        System.out.println("Evento cadastrado com sucesso!");
    }

    static void listarEventos() {

        if (eventos.isEmpty()) {
            System.out.println("Nenhum evento cadastrado.");
            return;
        }

        eventos.sort(Comparator.comparing(e -> e.horario));

        for (Evento e : eventos) {
            System.out.println(e);
        }
    }

    static void salvarEventos() {

        try (BufferedWriter bw = new BufferedWriter(new FileWriter("events.data"))) {

            for (Evento e : eventos) {
                bw.write(e.toFile());
                bw.newLine();
            }

        } catch (IOException e) {
            System.out.println("Erro ao salvar eventos.");
        }
    }

    static void carregarEventos() {

        File file = new File("events.data");
        if (!file.exists()) return;

        try (BufferedReader br = new BufferedReader(new FileReader(file))) {

            String linha;

            while ((linha = br.readLine()) != null) {

                String[] dados = linha.split(";");

                eventos.add(new Evento(
                        dados[0],
                        dados[1],
                        Categoria.valueOf(dados[2]),
                        LocalDateTime.parse(dados[3]),
                        dados[4]
                ));
            }

        } catch (IOException e) {
            System.out.println("Erro ao carregar eventos.");
        }
    }
}
